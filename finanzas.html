<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESOUL - Gestión Financiera v4.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0B0F17; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col">

    <!-- PORTAL DE ACCESO -->
    <div id="auth-screen" class="flex-1 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 w-full max-w-md space-y-6 shadow-2xl">
            <div class="flex flex-col items-center bg-white p-2 rounded-xl border border-slate-700 w-32 mx-auto">
                <div class="text-amber-500 font-extrabold text-xl tracking-tighter italic font-serif">besoul</div>
                <div class="text-slate-950 font-black text-[9px] tracking-[0.25em] border-t border-slate-950 w-full text-center mt-0.5">FIT</div>
            </div>
            <div class="text-center">
                <h2 class="text-base font-bold text-white tracking-tight">Gestión Financiera v4.1</h2>
                <p class="text-xs text-slate-400 mt-1">Acceso restringido a Administradores</p>
            </div>
            <div class="space-y-3 text-xs">
                <div>
                    <label class="text-slate-400 block mb-1">Email</label>
                    <input type="email" id="login-email" class="w-full bg-slate-950 border border-slate-800 rounded p-2.5 text-white" placeholder="admin@besoul.com">
                </div>
                <div>
                    <label class="text-slate-400 block mb-1">Contraseña</label>
                    <input type="password" id="login-pass" class="w-full bg-slate-950 border border-slate-800 rounded p-2.5 text-white" placeholder="••••••••">
                </div>
                <button onclick="ejecutarLogin()" id="btn-login" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-2.5 rounded-lg transition uppercase tracking-wider mt-2">
                    Acceder al Panel
                </button>
                <div id="login-error" class="text-red-500 text-[10px] text-center hidden"></div>
            </div>
        </div>
    </div>

    <!-- ENTORNO OPERATIVO -->
    <div id="app-content" class="hidden flex-1 flex flex-col">
        <header class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-white p-2 rounded-xl border border-slate-700 w-24">
                    <div class="text-amber-500 font-extrabold text-lg tracking-tighter italic font-serif text-center">besoul</div>
                </div>
                <h1 class="text-lg font-extrabold text-white">Gestión Financiera</h1>
            </div>
            <div class="flex items-center gap-3">
                <span id="lbl-usuario-logeado" class="text-xs text-slate-400 uppercase font-bold">---</span>
                <button onclick="logout()" class="px-3 py-1.5 text-xs font-bold rounded-lg bg-slate-950 text-slate-400 border border-slate-800 hover:text-white transition">Salir</button>
            </div>
        </header>

        <main class="flex-1 p-6">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 text-center max-w-2xl mx-auto mt-20">
                <h2 class="text-xl font-bold mb-4">Panel de Control Financiero</h2>
                <p class="text-slate-400 mb-6">Esta sección requiere que tu cuenta de Firebase tenga permisos de <b>Administrador</b> en Firestore.</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <a href="agenda.html" class="bg-slate-800 p-4 rounded-xl border border-slate-700 hover:border-amber-500 transition">
                        <div class="text-amber-500 font-bold">Volver a Agenda</div>
                    </a>
                    <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 opacity-50">
                        <div class="text-slate-500 font-bold italic">Próximamente: Informes PDF</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const BS_FIREBASE_CONFIG = {
            apiKey: "AIzaSyAHp7l39BYkgHTVNNwPaaa21tTksBQ94Zo",
            authDomain: "besoul-suite.firebaseapp.com",
            projectId: "besoul-suite",
            storageBucket: "besoul-suite.firebasestorage.app",
            messagingSenderId: "215142605598",
            appId: "1:215142605598:web:943629a7a9c50c034a1f0f"
        };

        if (!firebase.apps.length) firebase.initializeApp(BS_FIREBASE_CONFIG);
        const auth = firebase.auth();
        const firestore = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if (user) {
                // Verificar si es admin en Firestore
                firestore.collection('besoulSuite').doc('agenda').get().then(doc => {
                    const data = doc.data();
                    const creds = data.credenciales || {};
                    const email = user.email;
                    const userKey = Object.keys(creds).find(k => k === email || creds[k].email === email);
                    
                    if (userKey && creds[userKey].rol === 'admin') {
                        document.getElementById('auth-screen').classList.add('hidden');
                        document.getElementById('app-content').classList.remove('hidden');
                        document.getElementById('lbl-usuario-logeado').innerText = email;
                    } else {
                        alert("Acceso denegado: No tienes permisos de administrador.");
                        auth.signOut();
                    }
                });
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        function ejecutarLogin() {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const errorDiv = document.getElementById('login-error');
            const btn = document.getElementById('btn-login');

            if (!email || !pass) return;
            btn.disabled = true;
            btn.innerText = "Verificando...";
            errorDiv.classList.add('hidden');

            auth.signInWithEmailAndPassword(email, pass)
                .catch(err => {
                    btn.disabled = false;
                    btn.innerText = "Acceder al Panel";
                    errorDiv.innerText = "Error: " + err.message;
                    errorDiv.classList.remove('hidden');
                });
        }

        function logout() { auth.signOut().then(() => window.location.reload()); }
    </script>
</body>
</html>
